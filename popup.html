<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs Manager</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="hero">
        <p class="eyebrow" data-i18n="eyebrow"></p>
        <h1 data-i18n="title"></h1>
        <p class="description" data-i18n="description"></p>
      </div>

      <label class="languageField" for="languageSelect">
        <span class="languageLabel" data-i18n="languageLabel"></span>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="zh-TW">繁體中文</option>
          <option value="ja">日本語</option>
        </select>
      </label>

      <button id="sortTabsButton" type="button" data-i18n="sortButton"></button>
      <p class="hint" data-i18n="hint"></p>
      <p id="statusMessage" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
